<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Voluntariado</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div class="container">

    <h1>Gestión de Voluntariado</h1>
    <p class="subtitle">Administra las actividades y participantes</p>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <div class="card">
        <h2>Crear nueva actividad</h2>
        <form th:action="@{/activities}" th:object="${createActivityRequest}" method="post">
            <div class="form-group">
                <label for="name">Nombre</label>
                <input type="text" id="name" th:field="*{name}" placeholder="Ej. Limpieza de playa">
                <div class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>
            <div class="form-group">
                <label for="description">Descripción</label>
                <textarea id="description" th:field="*{description}" placeholder="¿De qué trata la actividad?"></textarea>
                <div class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
            </div>
            <div class="form-group">
                <label for="maxCapacity">Capacidad máxima</label>
                <input type="number" id="maxCapacity" th:field="*{maxCapacity}" min="1" placeholder="Ej. 10">
                <div class="field-error" th:if="${#fields.hasErrors('maxCapacity')}" th:errors="*{maxCapacity}"></div>
            </div>
            <button type="submit">Crear actividad</button>
        </form>
    </div>

    <div class="card">
        <h2>Actividades</h2>

        <div th:if="${activities.isEmpty()}" class="empty-state">
            Aún no hay actividades. Crea la primera arriba.
        </div>

        <div th:each="activity : ${activities}"
             th:classappend="${activity.status.name() == 'OPEN'} ? 'open' : 'closed'"
             class="activity">

            <div class="activity-header">
                <div class="activity-name" th:text="${activity.name}"></div>
                <span class="badge"
                      th:classappend="${activity.status.name() == 'OPEN'} ? 'open' : 'closed'"
                      th:text="${activity.status.name() == 'OPEN'} ? 'ABIERTA' : 'CERRADA'"></span>
            </div>

            <p class="activity-description"
               th:if="${activity.description != null and !activity.description.isEmpty()}"
               th:text="${activity.description}"></p>

            <div class="capacity">
                Participantes: <strong th:text="${activity.currentParticipants}"></strong>
                / <span th:text="${activity.maxCapacity}"></span>
            </div>

            <div class="capacity-bar">
                <div class="capacity-bar-fill"
                     th:style="'width: ' + (${activity.currentParticipants} * 100 / ${activity.maxCapacity}) + '%'"></div>
            </div>

            <div class="actions">
                <form th:if="${activity.status.name() == 'OPEN'}"
                      th:action="@{'/activities/' + ${activity.id} + '/add-participant'}" method="post">
                    <button type="submit" class="btn-add">Añadir participante</button>
                </form>

                <form th:if="${activity.currentParticipants > 0}"
                      th:action="@{'/activities/' + ${activity.id} + '/remove-participant'}" method="post">
                    <button type="submit" class="btn-remove">Quitar participante</button>
                </form>

                <a th:href="@{'/activities/' + ${activity.id} + '/edit'}" class="btn btn-edit">Editar</a>

                <form th:action="@{'/activities/' + ${activity.id} + '/delete'}" method="post"
                      onsubmit="return confirm('¿Estás seguro de eliminar esta actividad?');">
                    <button type="submit" class="btn-delete">Eliminar</button>
                </form>

                <span th:if="${activity.status.name() == 'CLOSED'}" class="closed-message">
                    Esta actividad ya no acepta más participantes
                </span>
            </div>
        </div>
    </div>

</div>

</body>
</html>
