<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Voluntariado</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            color: #2d3748;
            min-height: 100vh;
            padding: 30px 20px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
        }

        h1 {
            font-size: 28px;
            color: #1a365d;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #718096;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .error {
            background: #fff5f5;
            color: #c53030;
            padding: 12px 16px;
            border-left: 4px solid #c53030;
            border-radius: 4px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 22px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .card h2 {
            font-size: 18px;
            color: #2d3748;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #edf2f7;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.15s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3182ce;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        button, .btn {
            background: #3182ce;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            text-decoration: none;
            display: inline-block;
            font-family: inherit;
        }

        button:hover, .btn:hover {
            background: #2c5282;
        }

        .btn-add {
            background: #38a169;
        }

        .btn-add:hover {
            background: #2f855a;
        }

        .btn-edit {
            background: #d69e2e;
        }

        .btn-edit:hover {
            background: #b7791f;
        }

        .btn-delete {
            background: #c53030;
        }

        .btn-delete:hover {
            background: #9b2c2c;
        }

        .activity {
            background: white;
            border-radius: 10px;
            padding: 18px 20px;
            margin-bottom: 14px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
            border-left: 5px solid #cbd5e0;
            transition: transform 0.15s;
        }

        .activity:hover {
            transform: translateX(2px);
        }

        .activity.open {
            border-left-color: #38a169;
        }

        .activity.closed {
            border-left-color: #a0aec0;
            opacity: 0.75;
        }

        .activity-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            gap: 12px;
        }

        .activity-name {
            font-size: 17px;
            font-weight: 600;
            color: #2d3748;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .badge.open {
            background: #c6f6d5;
            color: #22543d;
        }

        .badge.closed {
            background: #e2e8f0;
            color: #4a5568;
        }

        .activity-description {
            color: #4a5568;
            font-size: 14px;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .capacity {
            font-size: 13px;
            color: #4a5568;
        }

        .capacity strong {
            color: #2d3748;
            font-size: 15px;
        }

        .capacity-bar {
            width: 100%;
            height: 6px;
            background: #edf2f7;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .capacity-bar-fill {
            height: 100%;
            background: linear-gradient(to right, #38a169, #3182ce);
            transition: width 0.3s;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #a0aec0;
            font-style: italic;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
            align-items: center;
        }

        .actions form {
            margin: 0;
        }

        .closed-message {
            font-size: 13px;
            color: #718096;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Gestión de Voluntariado</h1>
    <p class="subtitle">Administra las actividades y participantes</p>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <!-- Formulario de creación -->
    <div class="card">
        <h2>Crear nueva actividad</h2>
        <form th:action="@{/activities}" method="post">
            <div class="form-group">
                <label for="name">Nombre</label>
                <input type="text" id="name" name="name" placeholder="Ej. Limpieza de playa" required>
            </div>
            <div class="form-group">
                <label for="description">Descripción</label>
                <textarea id="description" name="description" placeholder="¿De qué trata la actividad?"></textarea>
            </div>
            <div class="form-group">
                <label for="maxCapacity">Capacidad máxima</label>
                <input type="number" id="maxCapacity" name="maxCapacity" min="1" placeholder="Ej. 10" required>
            </div>
            <button type="submit">Crear actividad</button>
        </form>
    </div>

    <!-- Lista de actividades -->
    <div class="card">
        <h2>Actividades</h2>

        <div th:if="${activities.isEmpty()}" class="empty-state">
            Aún no hay actividades. Crea la primera arriba.
        </div>

        <div th:each="activity : ${activities}"
             th:class="'activity ' + (${activity.status} == 'OPEN' ? 'open' : 'closed')">

            <div class="activity-header">
                <div class="activity-name" th:text="${activity.name}"></div>
                <span th:class="'badge ' + (${activity.status} == 'OPEN' ? 'open' : 'closed')"
                      th:text="${activity.status} == 'OPEN' ? 'ABIERTA' : 'CERRADA'"></span>
            </div>

            <p class="activity-description"
               th:if="${activity.description != null and !activity.description.isEmpty()}"
               th:text="${activity.description}"></p>

            <div class="capacity">
                Participantes: <strong th:text="${activity.currentParticipants}"></strong>
                / <span th:text="${activity.maxCapacity}"></span>
            </div>

            <div class="capacity-bar">
                <div class="capacity-bar-fill"
                     th:style="'width: ' + (${activity.currentParticipants} * 100 / ${activity.maxCapacity}) + '%'"></div>
            </div>

            <div class="actions">
                <form th:if="${activity.status} == 'OPEN'"
                      th:action="@{'/activities/' + ${activity.id} + '/anadir'}" method="post">
                    <button type="submit" class="btn-add">Añadir participante</button>
                </form>

                <a th:href="@{'/activities/' + ${activity.id} + '/editar'}" class="btn btn-edit">Editar</a>

                <form th:action="@{'/activities/' + ${activity.id} + '/eliminar'}" method="post"
                      onsubmit="return confirm('¿Estás seguro de eliminar esta actividad?');">
                    <button type="submit" class="btn-delete">Eliminar</button>
                </form>

                <span th:if="${activity.status} == 'CLOSED'" class="closed-message">
                    Esta actividad ya no acepta más participantes
                </span>
            </div>
        </div>
    </div>

</div>

</body>
</html>
